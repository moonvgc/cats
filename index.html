<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal Cats</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: black;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            color: white;
            font-family: sans-serif;
            font-size: 1.2em;
            z-index: 10;
        }

        #loading.hidden,
        #overlay.hidden {
            display: none;
        }

        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            color: white;
            font-family: sans-serif;
            font-size: 1.5em;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="loading">Loading</div>
<div id="overlay" class="hidden">Click</div>

<video id="video" controls preload="auto" playsinline>
    <source src="1.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
const loading = document.getElementById("loading");
const overlay = document.getElementById("overlay");

video.addEventListener("canplaythrough", () => {
    loading.classList.add("hidden");
    overlay.classList.remove("hidden");
});

function playMedia() {
    overlay.classList.add("hidden");
    video.play();
    if (video.requestFullscreen) {
        video.requestFullscreen();
    } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
    } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
    }
}

overlay.addEventListener("click", playMedia, { once: true });
</script>

</body>
</html>
